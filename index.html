<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wally - Mapa dos Dispositivos</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.94);
      --text: #182026;
      --muted: #5e6a71;
      --border: #d8dee3;
      --accent: #0b6bcb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #eef2f4;
    }

    body.locked #map,
    body.locked .panel,
    body.locked .toggle-panel {
      display: none;
    }

    .auth {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(160deg, rgba(6, 56, 69, 0.96), rgba(15, 111, 115, 0.94)),
        #063845;
    }

    body.locked .auth {
      display: flex;
    }

    .auth-card {
      width: min(420px, 100%);
      background: #f8fcfa;
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      padding: 22px;
    }

    .auth-card h1 {
      margin-bottom: 8px;
    }

    .auth-card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.4;
    }

    .auth-card label {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text);
    }

    .auth-card input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 16px;
      background: white;
      color: var(--text);
    }

    .auth-error {
      min-height: 20px;
      margin: 0 0 12px;
      color: #b42318;
      font-size: 14px;
    }

    #map {
      position: fixed;
      inset: 0;
    }

    .panel {
      position: fixed;
      z-index: 1000;
      top: 16px;
      left: 16px;
      width: min(390px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 35px rgba(12, 23, 31, 0.18);
      padding: 14px;
    }

    .panel.hidden {
      display: none;
    }

    .toggle-panel {
      position: fixed;
      z-index: 1001;
      top: 16px;
      right: 16px;
      min-width: 42px;
      padding: 0 12px;
      box-shadow: 0 8px 25px rgba(12, 23, 31, 0.2);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }

    .status {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button.secondary {
      background: white;
      color: var(--accent);
    }

    .device-list {
      display: grid;
      gap: 8px;
    }

    .device {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      padding: 10px;
      cursor: pointer;
    }

    .device strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }

    .device span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .device .fresh {
      color: #0f7b45;
      font-weight: 700;
    }

    .device .stale {
      color: #a35b00;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <section id="auth" class="auth" aria-live="polite">
    <form id="auth-form" class="auth-card">
      <h1>Monitor de seguranca</h1>
      <p id="auth-help">Digite a senha para acessar o mapa.</p>
      <label>
        Senha
        <input id="auth-password" type="password" autocomplete="current-password">
      </label>
      <label id="auth-confirm-row">
        Confirmar senha
        <input id="auth-confirm" type="password" autocomplete="new-password">
      </label>
      <div id="auth-error" class="auth-error"></div>
      <button id="auth-submit" type="submit">Entrar</button>
    </form>
  </section>

  <button id="toggle-panel" class="toggle-panel" type="button" aria-expanded="true">
    Esconder lista
  </button>

  <main class="panel">
    <h1>Wally</h1>
    <p id="status" class="status">Carregando dispositivos...</p>
    <div class="actions">
      <button id="refresh">Atualizar</button>
      <button id="fit" class="secondary">Ver todos</button>
      <button id="toggle-inactive" class="secondary">Mostrar inativos</button>
      <button id="lock" class="secondary">Bloquear</button>
    </div>
    <section id="devices" class="device-list"></section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>
  <script>
    const SUPABASE_URL = "https://drpqzkqzfdxodnhwwtga.supabase.co/rest/v1";
    const SUPABASE_KEY = "sb_publishable_nFCVFlLrzUu_jwBpgwEiEg_BAVe3Zlf";
    const REFRESH_MS = 30000;
    const ACTIVE_WINDOW_MS = 15 * 60 * 1000;
    const AUTH_HASH_KEY = "wally_web_password_hash";
    const AUTH_SALT_KEY = "wally_web_password_salt";
    const AUTH_UNLOCKED_KEY = "wally_web_unlocked";

    if (!window.L) {
      document.getElementById("status").textContent =
        "Leaflet nao carregou. Verifique a conexao com unpkg.com.";
      throw new Error("Leaflet not loaded");
    }

    const map = L.map("map", { zoomControl: true }).setView([-23.5505, -46.6333], 11);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const statusEl = document.getElementById("status");
    const devicesEl = document.getElementById("devices");
    const refreshButton = document.getElementById("refresh");
    const fitButton = document.getElementById("fit");
    const toggleInactiveButton = document.getElementById("toggle-inactive");
    const lockButton = document.getElementById("lock");
    const panelEl = document.querySelector(".panel");
    const togglePanelButton = document.getElementById("toggle-panel");
    const authForm = document.getElementById("auth-form");
    const authHelp = document.getElementById("auth-help");
    const authPassword = document.getElementById("auth-password");
    const authConfirm = document.getElementById("auth-confirm");
    const authConfirmRow = document.getElementById("auth-confirm-row");
    const authSubmit = document.getElementById("auth-submit");
    const authError = document.getElementById("auth-error");
    const markers = new Map();
    let showInactive = false;
    let refreshTimer = null;

    function displayName(device) {
      return device.device_name || device.device_id.slice(0, 8);
    }

    function formatDate(value) {
      if (!value) return "sem horario";
      return new Intl.DateTimeFormat("pt-BR", {
        dateStyle: "short",
        timeStyle: "medium"
      }).format(new Date(value));
    }

    function ageText(value) {
      if (!value) return "sem horario";
      const minutes = Math.max(0, Math.round((Date.now() - new Date(value).getTime()) / 60000));
      if (minutes < 2) return "visto agora";
      if (minutes < 60) return `visto ha ${minutes} min`;
      const hours = Math.round(minutes / 60);
      if (hours < 48) return `visto ha ${hours} h`;
      return `visto ha ${Math.round(hours / 24)} dias`;
    }

    function isFresh(value) {
      if (!value) return false;
      return Date.now() - new Date(value).getTime() <= 2 * REFRESH_MS;
    }

    function isActive(value) {
      if (!value) return false;
      return Date.now() - new Date(value).getTime() <= ACTIVE_WINDOW_MS;
    }

    function deviceKey(device) {
      const name = (device.device_name || "").trim();
      return name ? `name:${name.toLowerCase()}` : `id:${device.device_id}`;
    }

    function latestByName(rows) {
      const byName = new Map();
      for (const row of rows) {
        const key = deviceKey(row);
        if (!row.device_id || byName.has(key)) continue;
        byName.set(key, row);
      }
      return [...byName.values()];
    }

    async function loadDevices() {
      statusEl.textContent = "Atualizando dispositivos...";
      const params = new URLSearchParams({
        select: "device_id,device_name,latitude,longitude,accuracy,recorded_at,provider",
        order: "recorded_at.desc",
        limit: "5000"
      });

      const response = await fetch(`${SUPABASE_URL}/locations?${params}`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!response.ok) {
        const message = await response.text();
        throw new Error(message || `HTTP ${response.status}`);
      }

      return latestByName(await response.json());
    }

    function renderDevices(allDevices) {
      const devices = showInactive
        ? allDevices
        : allDevices.filter((device) => isActive(device.recorded_at));
      devicesEl.replaceChildren();

      for (const [key, marker] of markers) {
        if (!devices.some((device) => deviceKey(device) === key)) {
          marker.remove();
          markers.delete(key);
        }
      }

      for (const device of devices) {
        const point = [device.latitude, device.longitude];
        const name = displayName(device);
        const popup = `
          <strong>${name}</strong><br>
          ${device.latitude}, ${device.longitude}<br>
          Precisao: ${device.accuracy ?? "-"}m<br>
          Provedor: ${device.provider || "-"}<br>
          Horario: ${formatDate(device.recorded_at)}
        `;

        const key = deviceKey(device);
        let marker = markers.get(key);
        if (!marker) {
          marker = L.marker(point).addTo(map);
          markers.set(key, marker);
        }

        marker.setLatLng(point).bindPopup(popup);

        const item = document.createElement("button");
        item.type = "button";
        item.className = "device";
        const freshnessClass = isFresh(device.recorded_at) ? "fresh" : "stale";
        item.innerHTML = `
          <strong>${name}</strong>
          <span class="${freshnessClass}">${ageText(device.recorded_at)}</span>
          <span>${device.device_id}</span>
          <span>${device.latitude}, ${device.longitude}</span>
          <span>Precisao: ${device.accuracy ?? "-"}m | ${device.provider || "-"}</span>
          <span>${formatDate(device.recorded_at)}</span>
        `;
        item.addEventListener("click", () => {
          map.setView(point, 16);
          marker.openPopup();
        });
        devicesEl.appendChild(item);
      }

      statusEl.textContent = devices.length
        ? `${devices.length} ativo(s) de ${allDevices.length} nome(s). Atualiza a cada 30s.`
        : allDevices.length
          ? `${allDevices.length} nome(s) inativo(s). Toque em Mostrar inativos.`
          : "Nenhum nome encontrado.";

      fitAll();
      setTimeout(() => map.invalidateSize(), 100);
    }

    function fitAll() {
      const allMarkers = [...markers.values()];
      if (!allMarkers.length) return;
      const group = L.featureGroup(allMarkers);
      map.fitBounds(group.getBounds().pad(0.18), { maxZoom: 16 });
    }

    async function refresh() {
      try {
        renderDevices(await loadDevices());
      } catch (error) {
        statusEl.textContent = "Nao foi possivel carregar o Supabase. Verifique a policy de SELECT.";
        console.error(error);
      }
    }

    function hasPassword() {
      return Boolean(localStorage.getItem(AUTH_HASH_KEY) && localStorage.getItem(AUTH_SALT_KEY));
    }

    function configureAuthScreen() {
      const setupMode = !hasPassword();
      authHelp.textContent = setupMode
        ? "Crie uma senha para proteger este navegador."
        : "Digite a senha para acessar o mapa.";
      authConfirmRow.style.display = setupMode ? "grid" : "none";
      authSubmit.textContent = setupMode ? "Salvar senha" : "Entrar";
      authPassword.value = "";
      authConfirm.value = "";
      authError.textContent = "";
      setTimeout(() => authPassword.focus(), 50);
    }

    function lock() {
      sessionStorage.removeItem(AUTH_UNLOCKED_KEY);
      document.body.classList.add("locked");
      configureAuthScreen();
      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    }

    function unlock() {
      sessionStorage.setItem(AUTH_UNLOCKED_KEY, "true");
      document.body.classList.remove("locked");
      setTimeout(() => map.invalidateSize(), 100);
      refresh();
      if (!refreshTimer) refreshTimer = setInterval(refresh, REFRESH_MS);
    }

    function randomSalt() {
      const bytes = crypto.getRandomValues(new Uint8Array(16));
      return btoa(String.fromCharCode(...bytes));
    }

    async function hashPassword(password, salt) {
      const data = new TextEncoder().encode(`${salt}:${password}`);
      const digest = await crypto.subtle.digest("SHA-256", data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)));
    }

    async function savePassword(password) {
      const salt = randomSalt();
      localStorage.setItem(AUTH_SALT_KEY, salt);
      localStorage.setItem(AUTH_HASH_KEY, await hashPassword(password, salt));
    }

    async function verifyPassword(password) {
      const salt = localStorage.getItem(AUTH_SALT_KEY);
      const savedHash = localStorage.getItem(AUTH_HASH_KEY);
      if (!salt || !savedHash) return false;
      return await hashPassword(password, salt) === savedHash;
    }

    refreshButton.addEventListener("click", refresh);
    fitButton.addEventListener("click", fitAll);
    toggleInactiveButton.addEventListener("click", () => {
      showInactive = !showInactive;
      toggleInactiveButton.textContent = showInactive ? "Ocultar inativos" : "Mostrar inativos";
      refresh();
    });
    togglePanelButton.addEventListener("click", () => {
      const isHidden = panelEl.classList.toggle("hidden");
      togglePanelButton.textContent = isHidden ? "Mostrar lista" : "Esconder lista";
      togglePanelButton.setAttribute("aria-expanded", String(!isHidden));
      setTimeout(() => map.invalidateSize(), 100);
    });
    lockButton.addEventListener("click", lock);
    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = authPassword.value;
      const confirmation = authConfirm.value;
      authError.textContent = "";

      if (password.length < 4) {
        authError.textContent = "Use pelo menos 4 caracteres.";
        return;
      }

      if (!hasPassword()) {
        if (password !== confirmation) {
          authError.textContent = "As senhas nao conferem.";
          return;
        }
        await savePassword(password);
        unlock();
        return;
      }

      if (await verifyPassword(password)) {
        unlock();
      } else {
        authError.textContent = "Senha incorreta.";
      }
    });

    window.addEventListener("resize", () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 250);
    if (sessionStorage.getItem(AUTH_UNLOCKED_KEY) === "true") {
      unlock();
    } else {
      lock();
    }
  </script>
</body>
</html>
